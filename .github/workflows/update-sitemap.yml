name: Update Sitemaps

on:
  schedule:
    - cron: '0 */2 * * *'  # Runs every 2 hours
  workflow_dispatch:

jobs:
  update-sitemaps:
    runs-on: ubuntu-latest

    steps:
      - name: 🔽 Download sitemap.xml from Laravel API
        run: |
          curl -s -H "Accept: application/xml" https://makkahtravel.co.uk/administrator/api/generate-sitemap -o sitemap.xml

      - name: 🔽 Download post-sitemap.xml from Laravel API
        run: |
          mkdir -p blog
          curl -s -H "Accept: application/xml" https://makkahtravel.co.uk/administrator/api/generate-post-sitemap -o blog/post-sitemap.xml

      - name: 🚀 Upload sitemaps to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3 cp sitemap.xml s3://${{ secrets.S3_BUCKET_NAME }}/sitemap.xml --content-type "application/xml"
          aws s3 cp blog/post-sitemap.xml s3://${{ secrets.S3_BUCKET_NAME }}/blog/post-sitemap.xml --content-type "application/xml"
